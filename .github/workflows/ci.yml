name: ci

# Always-on, infra-free gate for the meter service (its own Cargo workspace).
#
# Hard gates (block the build):
#   - cargo fmt --all --check               (tree is rustfmt-normalized)
#   - clippy --all-targets -- -D warnings   (matches the repo `just clippy` bar)
#   - cargo test --workspace                (unit + the infra-free e2e_http cases)
#
# NOT run here: the `#[ignore]` DB-gated e2e suite in
# bin/meter-service/tests/e2e_http.rs. Those drive the real router against the
# shared `gridtokenx` Postgres (schema owned by IAM, partitioned meter_readings,
# seeded wallet-bearing users) — impractical to reproduce in this isolated
# submodule. They run against a live stack (root e2e Tier-2 / nightly / manual):
#   DATABASE_URL=… JWT_SECRET=… cargo test -p gridtokenx-meter-service \
#       --test e2e_http -- --ignored

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt (check)
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (infra-free; #[ignore] DB suite excluded)
        run: cargo test --workspace
